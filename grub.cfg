set timeout=5
set default=0

menuentry "SunsetOS (Default)" {
    insmod vbe
    insmod gfxterm
    terminal_output gfxterm
    terminal_input at_keyboard
    multiboot /boot/kernel.elf
    boot
}

menuentry "SunsetOS (Disk)" {
    insmod vbe
    insmod gfxterm
    terminal_output gfxterm
    terminal_input at_keyboard
    insmod part_msdos
    insmod fat
    set root='hd0,msdos1'
    multiboot /boot/kernel.elf
    boot
}